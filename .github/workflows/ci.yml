name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          PUBLIC_PHONE: ${{ vars.PUBLIC_PHONE || '925671052' }}
          PUBLIC_WHATSAPP: ${{ vars.PUBLIC_WHATSAPP || '51925671052' }}
          PUBLIC_EMAIL: ${{ vars.PUBLIC_EMAIL || 'mudanzasexpresoqhapaq@gmail.com' }}
          PUBLIC_GA4_ID: ${{ vars.PUBLIC_GA4_ID || 'G-XXXXXXXXXX' }}
          PUBLIC_META_PIXEL_ID: ${{ vars.PUBLIC_META_PIXEL_ID || '538047728714313' }}
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
